name: Build site_items.json from CSV

on:
  push:
    paths:
      - 'data/site_items.csv'
      - 'scripts/csv_to_site_items_json.py'
      - '.github/workflows/build-json.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-json:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Convert CSV to JSON
        run: python3 scripts/csv_to_site_items_json.py data/site_items.csv data/site_items.json

      - name: Commit updated JSON if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/site_items.json
          git diff --cached --quiet || git commit -m "Build site_items.json from CSV"
          git push